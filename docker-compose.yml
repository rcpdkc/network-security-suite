version: '3.8'

services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: nss-postgres
    environment:
      POSTGRES_USER: nssuser
      POSTGRES_PASSWORD: nsspass123
      POSTGRES_DB: network_security_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nss-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nssuser -d network_security_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nss-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: nssuser
      DB_PASSWORD: nsspass123
      DB_NAME: network_security_db
      PORT: 5000
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ../:/nss
    networks:
      - nss-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nss-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5001/api
      WDS_SOCKET_PORT: 3001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - nss-network
    command: npm start

volumes:
  postgres_data:

networks:
  nss-network:
    driver: bridge
